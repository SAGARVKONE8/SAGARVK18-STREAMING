server:
  port: ${PORT:8080}

spring:
  application:
    name: sagarvk18-streaming
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/sagarvk18_streaming?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root123}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      fail-on-empty-beans: false

jwt:
  secret: sagarvk18streamingsecretkey2024superlongsecurebase64encodedstring
  expiration: 604800000

logging:
  level:
    com.sagarvk18: DEBUG
    org.springframework.security: WARN
